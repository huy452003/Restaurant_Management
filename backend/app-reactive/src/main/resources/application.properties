spring.application.name=app-reactive
server.port=${PORT:8081}

spring.r2dbc.url=${DB_R2DBC_URL:r2dbc:mysql://localhost:3306/restaurant_management}
spring.r2dbc.username=${DB_USERNAME:root}
# Không đặt mật khẩu mặc định trong repo — dùng DB_PASSWORD hoặc application-local.properties (gitignore)
spring.r2dbc.password=${DB_PASSWORD:}

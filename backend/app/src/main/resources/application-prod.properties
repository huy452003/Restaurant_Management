# Production / Render — kích hoạt: SPRING_PROFILES_ACTIVE=prod (Dockerfile đã set)
server.address=0.0.0.0
server.port=${PORT:8080}

# DevTools gây lỗi / chậm khi chạy từ WAR trong container
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Trên Render thường không có Kafka; tránh cố kết nối localhost:9092 khiến JVM thoát trước khi bind port.
spring.kafka.listener.auto-startup=false

# ../logs không tồn tại và appuser không ghi được /logs — chỉ log ra STDOUT hoặc dưới /app/logs
logging.file.name=logs/application.log
logging.level.root=INFO
spring.jpa.show-sql=false
spring.output.ansi.enabled=never

# DB cold start trên Render: thử lại vài lần trước khi fail hẳn
spring.datasource.hikari.initialization-fail-timeout=180000
